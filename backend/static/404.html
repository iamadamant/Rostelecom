<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Маршрут не найден | Ростелеком</title>
    <style>
         :root {
            --rt-orange: #FF6A13;
            --rt-orange-dark: #E55A00;
            --rt-navy: #0F2B46;
            --rt-bg: #F5F7FA;
            --rt-text: #2D3748;
            --rt-muted: #64748B;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--rt-bg);
            color: var(--rt-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 680px;
            padding: 2rem;
        }
        
        .error-code {
            font-size: clamp(5rem, 15vw, 9rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.2em;
            background: linear-gradient(135deg, var(--rt-orange), var(--rt-orange-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }
        
        .illustration {
            width: 240px;
            height: 140px;
            margin: 1.5rem auto 1.2rem;
        }
        
        .illustration svg {
            width: 100%;
            height: 100%;
        }
        /* Анимация сигналов */
        
        .signal {
            animation: pulse 2s infinite ease-in-out;
        }
        
        .signal-2 {
            animation-delay: 0.6s;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }
        /* Лёгкое покачивание фургона */
        
        .van {
            animation: idle 4s infinite ease-in-out;
            transform-origin: center bottom;
        }
        
        @keyframes idle {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }
        
        h1 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            color: var(--rt-navy);
            margin-bottom: 0.6rem;
            font-weight: 700;
        }
        
        p {
            font-size: 1.05rem;
            color: var(--rt-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 540px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--rt-orange);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 10px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(255, 106, 19, 0.35);
        }
        
        .btn:hover {
            background: var(--rt-orange-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 106, 19, 0.45);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .footer-note {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #94A3B8;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem 1rem;
            }
            .illustration {
                width: 180px;
                height: 110px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="error-code">404</div>

        <div class="illustration">
            <svg viewBox="0 0 240 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Подложка карты -->
        <rect width="240" height="140" rx="16" fill="#F1F5F9"/>
        <path d="M30 110 L120 110 L160 70" stroke="#0F2B46" stroke-width="7" stroke-linecap="round" stroke-dasharray="10 6"/>
        <path d="M120 110 L200 110" stroke="#0F2B46" stroke-width="7" stroke-linecap="round"/>
        
        <!-- Тупик -->
        <circle cx="160" cy="70" r="8" fill="#FF6A13"/>
        <path d="M154 64 L166 76 M166 64 L154 76" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        
        <!-- Фургон бригады -->
        <g class="van">
          <rect x="65" y="85" width="48" height="24" rx="6" fill="#FF6A13"/>
          <rect x="76" y="89" width="16" height="12" rx="3" fill="#0F2B46"/>
          <circle cx="73" cy="109" r="5" fill="#1E293B"/>
          <circle cx="105" cy="109" r="5" fill="#1E293B"/>
          <rect x="80" y="100" width="20" height="2" rx="1" fill="#fff" opacity="0.8"/>
        </g>
        
        <!-- Сигналы связи -->
        <g class="signal" transform="translate(205, 50)">
          <path d="M-12 -8 Q0 -20 12 -8" stroke="#FF6A13" stroke-width="3" fill="none"/>
        </g>
        <g class="signal signal-2" transform="translate(205, 50)">
          <path d="M-20 -16 Q0 -36 20 -16" stroke="#FF6A13" stroke-width="3" fill="none" opacity="0.6"/>
        </g>
      </svg>
        </div>

        <h1>Маршрут для бригады не найден</h1>
        <p>Запрашиваемый путь отсутствует в системе навигации. Проверьте корректность адреса, обновите данные или свяжитесь с диспетчерской службой для построения альтернативного маршрута.</p>

        <a href="#" class="btn" onclick="exitAccount()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M15 8H1m0 0l5-5m-5 5l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Выйти из аккаунта
        </a>

        <div class="footer-note">© 2026 ПАО «Ростелеком». Все права защищены.</div>
    </main>
    <script>
        function exitAccount() {
            document.cookie = "user=; max-age=-1;";
            parent.window.location.href = "/";
        }
    </script>
</body>

</html>
