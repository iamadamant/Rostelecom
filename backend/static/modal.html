<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модальное окно Ростелеком</title>
    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Настройка кастомных цветов бренда -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rt: {
                            blue: '#005696', // Основной синий Ростелеком
                            dark: '#003355',
                            light: '#f0f4f8',
                            gray: '#8c98a8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Стили для скроллбара внутри модалки, если нужно */
        .modal-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .modal-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .modal-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .modal-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

    <!-- Кнопка вызова (для демо) -->
    <button onclick="toggleModal('addressModal')" class="bg-rt-blue text-white px-6 py-3 rounded-lg shadow-lg hover:bg-rt-dark transition font-medium">
        Добавить адрес заявки
    </button>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="addressModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Затемнение фона -->
        <div class="fixed inset-0 bg-gray-900 bg-opacity-60 transition-opacity backdrop-blur-sm" onclick="toggleModal('addressModal')"></div>

        <!-- Контейнер модального окна -->
        <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-2xl">
                
                <!-- Заголовок -->
                <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4 border-b border-gray-100 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="h-8 w-1 bg-rt-blue rounded-full"></div>
                        <h3 class="text-xl font-semibold leading-6 text-gray-900" id="modal-title">Добавление адреса</h3>
                    </div>
                    <button onclick="toggleModal('addressModal')" class="text-gray-400 hover:text-gray-600 transition">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- Тело формы -->
                <div class="px-4 py-5 sm:p-6 bg-white">
                    <form id="addressForm" onsubmit="submitForm(event)">
                        
                        <!-- Секция карты -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Выберите точку на карте</label>
                            <div id="map" class="w-full h-64 bg-gray-100 rounded-lg border border-gray-200 relative overflow-hidden">
                                <!-- Сюда загрузится карта -->
                                <div class="absolute inset-0 flex items-center justify-center text-gray-400 text-sm">
                                    Загрузка карты...
                                </div>
                            </div>
                            <p class="text-xs text-rt-gray mt-1">Кликните по карте, чтобы выбрать адрес.</p>
                        </div>

                        <!-- Сетка полей -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            
                            <!-- Адрес -->
                            <div class="md:col-span-2">
                                <label for="address" class="block text-sm font-medium text-gray-700 mb-1">Адрес объекта</label>
                                <input type="text" id="address" name="address" required placeholder="Например: г. Москва, ул. Ленина, д. 10"
                                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-rt-blue focus:ring-rt-blue sm:text-sm border p-2.5 transition placeholder-gray-400">
                            </div>

                            <!-- Очередность -->
                            <div>
                                <label for="queue" class="block text-sm font-medium text-gray-700 mb-1">Очередность</label>
                                <input type="number" id="queue" name="queue" min="1" value="1" required
                                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-rt-blue focus:ring-rt-blue sm:text-sm border p-2.5 transition">
                            </div>

                            <!-- Бригада -->
                            <div>
                                <label for="brigade" class="block text-sm font-medium text-gray-700 mb-1">Бригада</label>
                                <select id="brigade" name="brigade" required
                                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-rt-blue focus:ring-rt-blue sm:text-sm border p-2.5 bg-white transition">
                                    <option value="" disabled selected>Выберите бригаду</option>
                                    <option value="1">Бригада №1 (Монтажники)</option>
                                    <option value="2">Бригада №2 (Техподдержка)</option>
                                    <option value="3">Бригада №3 (Аварийная)</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Футер с кнопками -->
                <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 border-t border-gray-100">
                    <button type="button" onclick="submitForm(event)" 
                        class="inline-flex w-full justify-center rounded-md bg-rt-blue px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-rt-dark sm:ml-3 sm:w-auto transition">
                        Сохранить
                    </button>
                    <button type="button" onclick="toggleModal('addressModal')" 
                        class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2.5 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto transition">
                        Отмена
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем API Яндекс Карт (ВСТАВЬТЕ СВОЙ API КЛЮЧ ВМЕСТО ВАШ_API_КЛЮЧ) -->
    <!-- Для локального тестирования можно использовать sandbox, но для продакшена нужен ключ -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ВАШ_API_КЛЮЧ&lang=ru_RU" type="text/javascript"></script>

    <script>
        // Логика модального окна
        function toggleModal(modalID) {
            const modal = document.getElementById(modalID);
            modal.classList.toggle('hidden');
            
            // Если открываем модалку, инициализируем карту (если еще не инициализирована)
            if (!modal.classList.contains('hidden')) {
                initMap();
            }
        }

        // Логика формы
        function submitForm(e) {
            e.preventDefault();
            // Сбор данных
            const formData = {
                address: document.getElementById('address').value,
                queue: document.getElementById('queue').value,
                brigade: document.getElementById('brigade').value
            };
            
            console.log('Отправка данных:', formData);
            alert('Данные сохранены! Проверьте консоль.');
            toggleModal('addressModal');
        }

        // Логика Яндекс Карт
        let myMap;
        let myPlacemark;

        function initMap() {
            // Проверяем, загружен ли API
            if (!ymaps) return;

            ymaps.ready(function () {
                // Если карта уже есть, не создаем новую
                if (myMap) return;

                myMap = new ymaps.Map("map", {
                    center: [55.76, 37.64], // Москва по умолчанию
                    zoom: 10
                });

                // Обработчик клика по карте
                myMap.events.add('click', function (e) {
                    var coords = e.get('coords');

                    // Если метка уже существует, просто перемещаем её
                    if (myPlacemark) {
                        myPlacemark.geometry.setCoordinates(coords);
                    } else {
                        // Создаем метку
                        myPlacemark = new ymaps.Placemark(coords, {
                            hintContent: 'Новый адрес',
                            balloonContent: 'Выбранный адрес'
                        }, {
                            preset: 'islands#blueIcon'
                        });
                        myMap.geoObjects.add(myPlacemark);
                    }

                    // Получаем адрес по координатам (геокодинг)
                    ymaps.geocode(coords).then(function (res) {
                        var firstGeoObject = res.geoObjects.get(0);
                        // Вставляем адрес в инпут
                        document.getElementById('address').value = firstGeoObject.getAddressLine();
                    });
                });
            });
        }
    </script>
</body>
</html>
